kind = "web"
previewPath = "/"
title = "Elevatum"
version = "1.0.0"
id = "artifacts/elevatum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24344

[services.development]
run = "pnpm --filter @workspace/elevatum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elevatum", "run", "build" ]
publicDir = "artifacts/elevatum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24344"
BASE_PATH = "/"
